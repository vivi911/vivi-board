<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vivi's Board</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=20260421a">
</head>
<body>

<!-- 登入畫面 -->
<div id="login-screen">
  <div class="login-box">
    <h1 class="login-title" id="login-title">Vivi's Board</h1>
    <p class="login-subtitle" id="login-subtitle">專案協作白板</p>
    <script>
      (function() {
        const p = new URLSearchParams(window.location.search).get('project');
        const titles = {
          'sean-vending': { title: '販賣機業績自動化', subtitle: '專案協作看板' },
          'meili-emr': { title: '電子病歷 EMR', subtitle: '專案協作白板' },
          'asia-pacific': { title: '亞太資源管理顧問', subtitle: '專案協作白板' }
        };
        if (p && titles[p]) {
          document.getElementById('login-title').textContent = titles[p].title;
          document.getElementById('login-subtitle').textContent = titles[p].subtitle;
        } else if (p) {
          // 未知專案也顯示 project ID
          document.getElementById('login-title').textContent = p;
          document.getElementById('login-subtitle').textContent = '專案協作白板';
        }
      })();
    </script>
    <div class="login-form">
      <label>選擇你的角色</label>
      <div class="role-options" id="role-options">
        <!-- 由 JS 根據專案動態產生 -->
      </div>
      <label>選擇你的名字</label>
      <select id="login-user-select" onchange="onUserSelect()">
        <option value="">載入中...</option>
      </select>
      <div id="login-new-name" style="display:none;">
        <input type="text" id="login-name" placeholder="輸入你的名字" />
      </div>
      <button id="login-btn" onclick="doLogin()">進入白板</button>
    </div>
  </div>
</div>

<!-- 主畫面 -->
<div id="app" style="display:none;">
  <!-- 頂部導航 -->
  <header id="header">
    <div class="header-left">
      <span class="logo">Vivi's Board</span>
      <select id="project-select" onchange="switchProject(this.value)"></select>
    </div>
    <div class="header-center">
      <div id="tab-bar"></div>
    </div>
    <div class="header-right">
      <div class="legend" id="board-legend">
        <!-- 由 JS 根據專案動態產生：有系統標籤顯示系統色，無則顯示狀態色 -->
      </div>
      <span id="user-badge"></span>
      <button class="logout-btn" onclick="doLogout()" title="登出">登出</button>
    </div>
  </header>

  <!-- ===== 架構 Tab（原白板）===== -->
  <div id="view-architecture">
    <!-- 左側專案簡報 -->
    <div id="brief-panel">
      <div class="brief-toggle" onclick="toggleBrief()" title="收合簡報">◀</div>
      <div class="brief-scroll">
        <div id="brief-content"></div>
      </div>
      <div class="brief-resizer" id="brief-resizer"></div>
    </div>

    <!-- 白板區域 -->
    <div id="board-container">
      <div id="board">
        <svg id="connections"></svg>
        <div id="cards-container"></div>
        <div id="stickies-container"></div>
      </div>
    </div>

    <!-- 縮放控制 -->
    <div id="zoom-controls">
      <button onclick="zoomOut()" title="縮小">−</button>
      <span id="zoom-display">100%</span>
      <button onclick="zoomIn()" title="放大">+</button>
      <button onclick="zoomFit()" title="全覽" class="zoom-fit">全覽</button>
      <span class="zoom-divider"></span>
      <button onclick="addStickyNote()" title="新增便利貼" class="sticky-add-btn">📝 便利貼</button>
    </div>

    <!-- 右側面板 -->
    <div id="panel" class="panel-hidden">
      <div class="panel-header">
        <h2 id="panel-title"></h2>
        <button class="panel-close" onclick="closePanel()">&times;</button>
      </div>
      <div class="panel-status">
        <label>狀態：</label>
        <select id="panel-status-select" onchange="updateCardStatus()">
          <option value="confirmed">✅ 已確認</option>
          <option value="discuss">📌 待討論</option>
          <option value="gap">❌ 待開發</option>
        </select>
      </div>
      <div class="panel-status" id="panel-system-row" style="display:none;">
        <label>系統：</label>
        <select id="panel-system-select" onchange="updateCardSystem()">
          <option value="">未指定</option>
        </select>
      </div>
      <div class="panel-content" id="panel-content"></div>
      <div class="panel-comments">
        <h3>留言</h3>
        <div id="comments-list"></div>
        <div class="comment-input">
          <textarea id="comment-text" placeholder="輸入留言..." rows="3"></textarea>
          <button onclick="addComment()">送出</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== 訪談 Tab ===== -->
  <div id="view-interview" style="display:none;">
    <div class="interview-container">
      <div class="interview-header" id="interview-header"></div>
      <div class="interview-body" id="interview-body"></div>
    </div>
    <!-- AI 助理浮動泡泡 -->
    <div id="ai-bubble" class="ai-bubble" onclick="toggleAIPanel()">
      <span class="ai-bubble-icon" id="ai-bubble-icon">AI</span>
    </div>
    <div id="ai-panel" class="ai-panel" style="display:none;">
      <div class="ai-panel-header">
        <span class="ai-panel-title">AI 會議助理</span>
        <button class="ai-panel-close" onclick="toggleAIPanel()">&times;</button>
      </div>
      <div class="ai-panel-body" id="ai-panel-body">
        <div class="ai-panel-empty">按下方麥克風開始錄音<br>錄完後 AI 自動產出重點摘要</div>
      </div>
      <div class="ai-panel-footer">
        <button class="ai-rec-btn" id="ai-rec-btn" onclick="toggleRecording()">
          <span class="ai-rec-dot" id="ai-rec-dot"></span>
          <span id="ai-rec-label">開始錄音</span>
        </button>
        <span class="ai-rec-timer" id="rec-timer"></span>
      </div>
    </div>
  </div>

  <!-- ===== 研究 Tab ===== -->
  <div id="view-research" style="display:none;">
    <div class="research-container">
      <div class="research-header" id="research-header"></div>
      <div class="research-body" id="research-body"></div>
    </div>
  </div>

  <!-- ===== 規格 Tab ===== -->
  <div id="view-spec" style="display:none;">
    <div class="spec-container">
      <div class="spec-header" id="spec-header"></div>
      <div class="spec-toolbar" id="spec-toolbar"></div>
      <div class="spec-body" id="spec-body"></div>
    </div>
  </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script src="data.js?v=20260421a"></script>
<script src="mockups.js?v=20260421a"></script>
<script src="app.js?v=20260421a"></script>
</body>
</html>
